name: 'checks'
on:
  pull_request:
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - run: |
          wget -q https://github.com/WeiDUorg/weidu/releases/download/v249.00/WeiDU-Linux-249-amd64.zip
          unzip WeiDU-Linux-249-amd64.zip
          rm WeiDU-Linux-249-amd64.zip
          sudo mv WeiDU-Linux/weidu /usr/local/bin/weidu
          rm -rf WeiDU-Linux
      - uses: jdx/mise-action@main
        with:
          cache: true
          mise_toml: |
            [tools]
            hk = "1.44.2"
      - run: |
          export HK_PKL_BACKEND=pklr
          export HK_FIX=0
          hk run pre-commit --all -j 10 --why
